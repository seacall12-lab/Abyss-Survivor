<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Abyss Survivor 내부 테스트</title>
  <style>
    :root { color-scheme: dark; font-family: system-ui, sans-serif; }
    body { max-width: 760px; margin: 0 auto; padding: 24px; background: #081018; color: #eaf7ff; }
    h1 { margin-bottom: 6px; font-size: 24px; }
    .summary { padding: 14px; border: 1px solid #315064; border-radius: 10px; background: #101e29; }
    .summary.pass { border-color: #3b9d78; }
    .summary.fail { border-color: #d26068; }
    ol { padding-left: 24px; }
    li { margin: 8px 0; padding: 10px; border-radius: 8px; background: #122330; }
    li.pass { color: #91e7bd; }
    li.fail { color: #ff9da3; }
    pre { margin: 7px 0 0; white-space: pre-wrap; color: #ffd0d3; }
  </style>
</head>
<body>
  <h1>Abyss Survivor 내부 테스트</h1>
  <p>게임 저장값을 임시로 백업한 뒤 핵심 회귀 검사를 실행하고 원래 값으로 복원합니다.</p>
  <div id="summary" class="summary">테스트 준비 중…</div>
  <ol id="results"></ol>

  <script src="data.js"></script>
  <script src="state.js"></script>
  <script src="feedback.js"></script>
  <script src="game.js"></script>
  <script src="render.js"></script>
  <script src="ui.js"></script>
  <script src="pwa.js"></script>
  <script src="tests.js"></script>
</body>
</html>
